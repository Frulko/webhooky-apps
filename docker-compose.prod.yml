version: '3.9'

# Production compose — uses pre-built image from Docker Hub.
# Override the image tag via DOCKER_IMAGE, e.g.:
#   DOCKER_IMAGE=frulko/webhooky:0.6.0
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: webhook
      POSTGRES_PASSWORD: webhook
      POSTGRES_DB: webhook_catcher
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U webhook -d webhook_catcher']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  server:
    image: ${DOCKER_IMAGE:-frulko/webhooky:latest}
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://webhook:webhook@postgres:5432/webhook_catcher
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      PORT: ${PORT:-3000}
      HOST: ${HOST:-0.0.0.0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      - postgres
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
