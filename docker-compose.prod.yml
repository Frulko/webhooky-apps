version: '3.9'

# Production stack — Docker Swarm (Portainer).
# Set environment variables via Portainer's stack env UI.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: webhook
      POSTGRES_PASSWORD: webhook
      POSTGRES_DB: webhook_catcher
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U webhook -d webhook_catcher']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal
    deploy:
      restart_policy:
        condition: on-failure

  server:
    image: ${DOCKER_IMAGE:-frulko/webhooky:latest}
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://webhook:webhook@postgres:5432/webhook_catcher
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      PORT: ${PORT:-3000}
      HOST: ${HOST:-0.0.0.0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - internal
    deploy:
      restart_policy:
        condition: on-failure

volumes:
  pgdata:

networks:
  internal:
    driver: overlay
    attachable: true
