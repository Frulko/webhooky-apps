name: Release

# Triggered by a version tag: git tag v1.2.3 && git push --tags
on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Run full test suite first ───────────────────────────────────────────────
  test:
    name: Tests
    uses: ./.github/workflows/ci.yml

  # ── Publish CLI to npm ──────────────────────────────────────────────────────
  publish-cli:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Publish webhooky
        run: npm publish --access public
        working-directory: apps/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Build and push Docker image to Docker Hub ─────────────────────────────
  build-push-docker:
    name: Build & push Docker image
    needs: test
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: frulko/webhooky
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Trigger Portainer redeploy via webhook ─────────────────────────────────
  deploy:
    name: Deploy via Portainer
    needs: build-push-docker
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Portainer webhook
        if: ${{ secrets.PORTAINER_WEBHOOK_URL != '' }}
        run: |
          curl -fsSL -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
